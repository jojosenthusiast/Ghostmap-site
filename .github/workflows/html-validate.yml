name: HTML validate

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install html-validate
        run: npm install --no-save html-validate@8

      - name: Validate
        run: npx html-validate "**/*.html" --ignore-pattern "node_modules/**"
        continue-on-error: true
